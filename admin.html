<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Everlast — Admin</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
/* (tu CSS intacto, no lo toqué) */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial}
.upload-zone{border:2px dashed #ccc;padding:20px;text-align:center;cursor:pointer}
.btn{padding:10px 15px;cursor:pointer}
.btn-primary{background:#1a3a2a;color:#fff;border:none}
.preview-box{background:#f2f2ef;padding:10px}
</style>
</head>

<body>

<h2>Admin Everlast</h2>

<!-- PDF METRICOOL -->
<div>
  <h3>Metricool automático</h3>

  <label class="upload-zone">
    <input type="file" accept=".pdf" id="pdfFile">
    Subir PDF de Metricool
  </label>

  <div id="pdfPreview" style="display:none;margin-top:10px">
    <div class="preview-box" id="pdfContent"></div>
    <button class="btn btn-primary" onclick="saveMetricool()">Guardar métricas</button>
  </div>
</div>

<script>

const SB='https://mldhrifnmfrerlqcmlmt.supabase.co';
const KEY='TU_KEY';
const H={apikey:KEY,Authorization:'Bearer '+KEY,'Content-Type':'application/json'};
const Hg={apikey:KEY,Authorization:'Bearer '+KEY};

async function ins(tbl,d){
  await fetch(`${SB}/rest/v1/${tbl}`,{
    method:'POST',
    headers:H,
    body:JSON.stringify(d)
  });
}

async function del(tbl,f){
  await fetch(`${SB}/rest/v1/${tbl}?${f}`,{
    method:'DELETE',
    headers:H
  });
}

function toast(m){alert(m);}

let metricoolData = null;

// ======================
// PARSER PDF
// ======================
function parseMetricool(text){

  function getValue(label){
    const regex = new RegExp(label + "\\s*(\\d+[\\.,]?\\d*)","i");
    const match = text.match(regex);
    return match ? parseFloat(match[1].replace(",","")) : 0;
  }

  const seguidores = getValue("Followers");
  const impresiones = getValue("Impressions");
  const alcance = getValue("Reach");
  const engagement = getValue("Engagement");

  const meses = ["January","February","March","April","May","June","July","August","September","October","November","December"];

  let periodo = "Sin período";

  meses.forEach(m=>{
    if(text.includes(m)){
      periodo = m + " 2026";
    }
  });

  metricoolData = {
    periodo,
    seguidores,
    impresiones,
    alcance,
    engagement
  };

  document.getElementById('pdfContent').innerHTML = `
    <strong>Periodo:</strong> ${periodo}<br>
    <strong>Seguidores:</strong> ${seguidores}<br>
    <strong>Impresiones:</strong> ${impresiones}<br>
    <strong>Alcance:</strong> ${alcance}<br>
    <strong>Engagement:</strong> ${engagement}%
  `;

  document.getElementById('pdfPreview').style.display='block';
}


// ======================
// GUARDAR EN SUPABASE
// ======================
async function saveMetricool(){

  if(!metricoolData) return;

  const p = metricoolData.periodo;

  try{

    await del('reportes_organico',`periodo=eq.${encodeURIComponent(p)}&red=eq.instagram`);

    await ins('reportes_organico',{
      periodo:p,
      red:'instagram',
      seguidores:metricoolData.seguidores,
      nuevos_seguidores:0,
      publicaciones:0,
      impresiones:metricoolData.impresiones,
      alcance_promedio:metricoolData.alcance,
      interacciones:0,
      engagement:metricoolData.engagement
    });

    toast("Metricool cargado ✓");

  }catch(e){
    alert(e.message);
  }
}


// ======================
// LECTOR PDF
// ======================
document.getElementById('pdfFile').addEventListener('change', async (e)=>{

  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = async function(){

    const typedArray = new Uint8Array(this.result);
    const pdf = await pdfjsLib.getDocument(typedArray).promise;

    let text = "";

    for(let i=1;i<=pdf.numPages;i++){
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      text += content.items.map(i=>i.str).join(" ");
    }

    parseMetricool(text);
  };

  reader.readAsArrayBuffer(file);
});

</script>

</body>
</html>
